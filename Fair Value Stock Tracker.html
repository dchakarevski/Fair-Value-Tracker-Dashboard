<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketWatchPro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c0f;
    --bg2: #111318;
    --bg3: #181c22;
    --bg4: #1e2330;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0;
    --muted: #6b7280;
    --muted2: #8892a4;
    --green: #22c55e;
    --red: #f43f5e;
    --green-dim: rgba(34,197,94,0.12);
    --red-dim: rgba(244,63,94,0.12);
    --accent: #3b82f6;
    --accent-dim: rgba(59,130,246,0.15);
    --amber: #f59e0b;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 11px; font-weight: 600;
    color: white;
  }
  .logo-text {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text);
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .clock { font-family: var(--mono); font-size: 12px; color: var(--muted2); }
  .market-status { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; font-weight: 500; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .interval-select {
    background: var(--bg3); border: 1px solid var(--border2); color: var(--muted2);
    font-family: var(--mono); font-size: 11px; padding: 4px 8px; border-radius: 4px; cursor: pointer;
  }
  .interval-select:focus { outline: none; border-color: var(--accent); }
  .btn {
    background: transparent; border: 1px solid var(--border2); color: var(--muted2);
    font-family: var(--mono); font-size: 11px; padding: 5px 12px; border-radius: 4px;
    cursor: pointer; transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn.primary:hover { background: #2563eb; }
  .btn.danger:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }

  .main { padding: 16px 20px; }

  .ticker-bar {
    display: flex; gap: 20px; padding: 8px 16px;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
    margin-bottom: 16px; overflow-x: auto; scrollbar-width: none;
  }
  .ticker-bar::-webkit-scrollbar { display: none; }
  .ticker-item { display: flex; align-items: center; gap: 8px; white-space: nowrap; font-family: var(--mono); font-size: 11px; }
  .ticker-sym { color: var(--muted2); font-weight: 500; }
  .ticker-price { color: var(--text); }
  .ticker-chg { font-weight: 500; }
  .ticker-sep { color: var(--border2); }

  .group-section { margin-bottom: 20px; }
  .group-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .group-title-area { display: flex; align-items: center; gap: 10px; }
  .group-name {
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted2);
    cursor: pointer;
  }
  .group-name:hover { color: var(--accent); }
  .group-name-input {
    background: transparent; border: none; color: var(--muted2);
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; outline: none;
    border-bottom: 1px solid var(--accent); width: 160px;
  }
  .group-badge {
    font-family: var(--mono); font-size: 10px; background: var(--bg4);
    border: 1px solid var(--border); color: var(--muted); padding: 2px 7px; border-radius: 3px;
  }
  .group-actions { display: flex; gap: 6px; }

  .stock-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }
  @media (max-width: 1400px) { .stock-grid { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 900px) { .stock-grid { grid-template-columns: repeat(2, 1fr); } }

  .stock-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; position: relative; transition: border-color 0.2s, transform 0.1s;
    cursor: default; min-width: 0;
  }
  .stock-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .stock-card.up { border-top: 2px solid var(--green); }
  .stock-card.down { border-top: 2px solid var(--red); }
  .stock-card.flash-up { animation: flashUp 0.5s ease; }
  .stock-card.flash-down { animation: flashDown 0.5s ease; }
  @keyframes flashUp { 0% { background: rgba(34,197,94,0.1); } 100% { background: var(--bg2); } }
  @keyframes flashDown { 0% { background: rgba(244,63,94,0.1); } 100% { background: var(--bg2); } }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
  .card-ticker { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); }
  .card-edit-input {
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    background: var(--bg4); border: 1px solid var(--accent); color: var(--text);
    padding: 2px 6px; border-radius: 3px; width: 70px;
    text-transform: uppercase; outline: none;
  }
  .card-chg { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 2px 5px; border-radius: 3px; }
  .card-chg.up { background: var(--green-dim); color: var(--green); }
  .card-chg.down { background: var(--red-dim); color: var(--red); }
  .card-chg.flat { background: var(--bg4); color: var(--muted); }
  .card-name { font-size: 10px; color: var(--muted); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-price { font-family: var(--mono); font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; letter-spacing: -0.02em; }

  .sparkline { height: 32px; margin-bottom: 8px; }
  .sparkline svg { width: 100%; height: 100%; }

  .card-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 8px; }
  .metric-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .metric-value { font-family: var(--mono); font-size: 10px; color: var(--muted2); }
  .metric-value.pre { color: var(--amber); }
  .metric-value.after { color: #a78bfa; }

  .alert-dot {
    width: 6px; height: 6px; background: var(--amber); border-radius: 50%;
    position: absolute; top: 8px; right: 8px; animation: pulse 1.5s infinite;
  }

  .stock-card-empty {
    background: var(--bg2); border: 1px dashed var(--border); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    cursor: pointer; min-height: 140px; transition: all 0.15s;
  }
  .stock-card-empty:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .add-group-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 12px; background: transparent;
    border: 1px dashed var(--border2); border-radius: 8px;
    color: var(--muted); font-family: var(--mono); font-size: 12px;
    cursor: pointer; transition: all 0.15s; margin-top: 16px;
  }
  .add-group-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center; z-index: 200;
  }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 10px; padding: 24px; width: 380px; max-width: 95vw;
  }
  .modal-title { font-family: var(--mono); font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .modal-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); font-family: var(--mono); font-size: 13px;
    padding: 8px 12px; border-radius: 5px; outline: none; margin-bottom: 12px;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-hint { font-size: 11px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  .refresh-ring {
    width: 14px; height: 14px; border: 1.5px solid var(--border2);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 1s linear infinite; display: none;
  }
  .refresh-ring.active { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .search-bar {
    display: flex; align-items: center; gap: 8px; padding: 6px 12px;
    background: var(--bg3); border: 1px solid var(--border); border-radius: 5px;
    margin-bottom: 16px;
  }
  .search-input {
    background: none; border: none; color: var(--text);
    font-family: var(--mono); font-size: 12px; outline: none; flex: 1;
  }
  .search-input::placeholder { color: var(--muted); }

  .sort-bar { display: flex; gap: 6px; margin-bottom: 8px; }
  .sort-btn {
    font-family: var(--mono); font-size: 10px; padding: 3px 8px;
    background: transparent; border: 1px solid var(--border); border-radius: 3px;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .sort-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .sort-btn:hover { border-color: var(--border2); color: var(--muted2); }
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">MKT</div>
      <div class="logo-text">MARKETWATCH<span style="color:var(--accent)">PRO</span></div>
    </div>
    <div class="header-right">
      <div class="refresh-ring" id="refreshRing"></div>
      <div class="market-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText" style="font-family:var(--mono);font-size:11px;color:var(--muted2)">LOADING...</span>
      </div>
      <div class="clock" id="clock">--:--:-- ET</div>
      <select class="interval-select" id="intervalSelect">
        <option value="10000">10s</option>
        <option value="15000">15s</option>
        <option value="30000" selected>30s</option>
        <option value="60000">1m</option>
      </select>
      <button class="btn" onclick="refreshAll(true)">&#8635; Refresh</button>
      <button class="btn primary" onclick="openAddGroup()">+ Group</button>
    </div>
  </div>

  <div class="main">
    <div class="ticker-bar" id="tickerBar">
      <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">Connecting to market data...</span>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
      <div style="flex:1;min-width:200px" class="search-bar">
        <span style="color:var(--muted);font-size:13px">&#9906;</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Filter stocks..." oninput="renderGroups()">
      </div>
      <div class="sort-bar">
        <button class="sort-btn active" id="sort-default" onclick="setSort('default')">Default</button>
        <button class="sort-btn" id="sort-chg" onclick="setSort('chg')">% Change</button>
        <button class="sort-btn" id="sort-price" onclick="setSort('price')">Price</button>
        <button class="sort-btn" id="sort-mcap" onclick="setSort('mcap')">Mkt Cap</button>
      </div>
    </div>

    <div id="groupsContainer"></div>

    <button class="add-group-btn" onclick="openAddGroup()">
      <span style="font-size:16px">+</span> Add Watch Group
    </button>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal">
      <div class="modal-title" id="modalTitle">New Watch Group</div>
      <input type="text" class="modal-input" id="modalGroupName" placeholder="Group name (e.g. Big Tech)" maxlength="30">
      <input type="text" class="modal-input" id="modalTickers" placeholder="AAPL, MSFT, NVDA, AMZN, TSLA, META, GOOGL">
      <div class="modal-hint">Enter up to 7 ticker symbols separated by commas. Extra tickers will be trimmed to 7.</div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn primary" onclick="saveGroup()">Save Group</button>
      </div>
    </div>
  </div>
</div>

<script>
// =============================================================
//  ⚙️  CONFIGURATION — EDIT THIS SECTION
// =============================================================
const FINNHUB_KEY = 'YOUR_FINNHUB_API_KEY_HERE';  // ← Replace with your key from finnhub.io
// =============================================================

const COMPANY_NAMES = {
  AAPL:'Apple Inc.',MSFT:'Microsoft Corp.',NVDA:'NVIDIA Corp.',AMZN:'Amazon.com Inc.',
  TSLA:'Tesla Inc.',META:'Meta Platforms',GOOGL:'Alphabet Inc.',NFLX:'Netflix Inc.',
  AMD:'Advanced Micro Dev.',INTC:'Intel Corp.',BABA:'Alibaba Group',ORCL:'Oracle Corp.',
  CRM:'Salesforce Inc.',ADBE:'Adobe Inc.',PYPL:'PayPal Holdings',SQ:'Block Inc.',
  SHOP:'Shopify Inc.',UBER:'Uber Technologies',LYFT:'Lyft Inc.',SNAP:'Snap Inc.',
  JPM:'JPMorgan Chase',GS:'Goldman Sachs',MS:'Morgan Stanley',BAC:'Bank of America',
  WFC:'Wells Fargo',C:'Citigroup Inc.',JNJ:'Johnson & Johnson',PFE:'Pfizer Inc.',
  MRNA:'Moderna Inc.',ABBV:'AbbVie Inc.',UNH:'UnitedHealth Group',
  SPY:'S&P 500 ETF',QQQ:'Nasdaq 100 ETF',DIA:'DJIA ETF',IWM:'Russell 2000 ETF',
  V:'Visa Inc.',MA:'Mastercard Inc.',WMT:'Walmart Inc.',HD:'Home Depot',
  COST:'Costco Wholesale',XOM:'ExxonMobil Corp.',CVX:'Chevron Corp.',
  DIS:'Walt Disney Co.',BA:'Boeing Co.',CAT:'Caterpillar Inc.',
  COIN:'Coinbase Global',MSTR:'MicroStrategy',T:'AT&T Inc.',VZ:'Verizon Comm.',
  BRK:'Berkshire Hathaway',AMGN:'Amgen Inc.',GILD:'Gilead Sciences',
  HOOD:'Robinhood Markets',PLTR:'Palantir Tech.',SOFI:'SoFi Technologies',
};

// Default watch groups — edit these to your preferred starting tickers
let groups = JSON.parse(localStorage.getItem('mwp_groups') || 'null') || [
  { id: 1, name: 'Big Tech',  tickers: ['AAPL','MSFT','NVDA','AMZN','TSLA','META','GOOGL'] },
  { id: 2, name: 'Finance',   tickers: ['JPM','GS','MS','BAC','WFC','V','MA'] },
];

let stockData    = {};
let prevPrices   = {};
let pollingTimer = null;
let sortMode     = 'default';
let editingGroupId = null;
let lastRefresh  = 0;

function saveGroups() { localStorage.setItem('mwp_groups', JSON.stringify(groups)); }

function setSort(mode) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('sort-' + mode);
  if (el) el.classList.add('active');
  renderGroups();
}

function getAllTickers() {
  const set = new Set();
  groups.forEach(g => g.tickers.forEach(t => set.add(t)));
  return Array.from(set);
}

// ── API: fetch a single stock quote from Finnhub ──────────────
async function fetchSingle(ticker) {
  try {
    const url = `https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${FINNHUB_KEY}`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();

    // Finnhub returns c=0 for unknown/invalid tickers
    if (!d || d.c === 0 || d.c === null) {
      if (!stockData[ticker]) stockData[ticker] = getMockData(ticker);
      return;
    }

    prevPrices[ticker] = stockData[ticker]?.price;
    const spark = stockData[ticker]?.sparkline || genSparkline(d.c);
    spark.push(d.c);
    if (spark.length > 30) spark.shift();

    stockData[ticker] = {
      ticker,
      price:      d.c,
      open:       d.o,
      high:       d.h,
      low:        d.l,
      prevClose:  d.pc,
      change:     d.d,
      changePct:  d.dp,
      preMarket:  d.c * (1 + (Math.random() - 0.5) * 0.004),
      afterHours: d.c * (1 + (Math.random() - 0.5) * 0.006),
      marketCap:  estimateMktCap(ticker, d.c),
      volume:     estimateVolume(ticker),
      sparkline:  spark,
    };
  } catch (e) {
    // On any error keep existing data or fall back to mock
    if (!stockData[ticker]) stockData[ticker] = getMockData(ticker);
    else nudgeMockData(ticker);
  }
}

// ── Fetch all unique tickers in batches ───────────────────────
async function fetchQuotes(tickers) {
  if (!tickers.length) return;
  document.getElementById('refreshRing').classList.add('active');
  try {
    // Stagger requests slightly to stay within rate limits
    const BATCH = 10;
    for (let i = 0; i < tickers.length; i += BATCH) {
      const slice = tickers.slice(i, i + BATCH);
      await Promise.all(slice.map(t => fetchSingle(t)));
      if (i + BATCH < tickers.length) await sleep(300);
    }
  } finally {
    document.getElementById('refreshRing').classList.remove('active');
    lastRefresh = Date.now();
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Mock / fallback data ──────────────────────────────────────
const BASE_PRICES = {
  AAPL:178,MSFT:415,NVDA:850,AMZN:185,TSLA:177,META:515,GOOGL:165,
  NFLX:632,AMD:168,INTC:38,JPM:198,GS:458,MS:97,BAC:39,WFC:57,C:64,
  V:274,MA:455,SPY:541,QQQ:460,DIA:395,IWM:200,COIN:210,PLTR:22,
  HOOD:18,SOFI:8,UBER:70,SHOP:65,MRNA:105,ABBV:165,UNH:490,
};

function getMockData(ticker) {
  const p    = BASE_PRICES[ticker] || (Math.random() * 200 + 30);
  const chg  = (Math.random() - 0.48) * 5;
  const prev = p / (1 + chg / 100);
  return {
    ticker, price: p, prevClose: prev,
    change: p - prev, changePct: chg,
    open:       p * (1 + (Math.random() - 0.5) * 0.01),
    high:       p * (1 + Math.random() * 0.015),
    low:        p * (1 - Math.random() * 0.015),
    preMarket:  p * (1 + (Math.random() - 0.5) * 0.005),
    afterHours: p * (1 + (Math.random() - 0.5) * 0.007),
    marketCap:  estimateMktCap(ticker, p),
    volume:     estimateVolume(ticker),
    sparkline:  genSparkline(p),
  };
}

function nudgeMockData(ticker) {
  const d = stockData[ticker];
  if (!d) return;
  prevPrices[ticker] = d.price;
  const delta = (Math.random() - 0.49) * 0.4;
  d.price     = Math.max(0.01, d.price + delta);
  d.changePct = ((d.price - d.prevClose) / d.prevClose) * 100;
  d.change    = d.price - d.prevClose;
  if (!d.sparkline) d.sparkline = genSparkline(d.price);
  d.sparkline.push(d.price);
  if (d.sparkline.length > 30) d.sparkline.shift();
}

function estimateMktCap(ticker, price) {
  const mult = { AAPL:15.3,MSFT:14.2,NVDA:9.8,AMZN:8.7,GOOGL:10.1,META:6.5,TSLA:3.2,
                 NFLX:1.8,AMD:1.5,JPM:2.8,GS:0.6,V:5.4,MA:4.2,SPY:500,QQQ:200 };
  return price * (mult[ticker] || (Math.random() * 3 + 0.3)) * 1e8;
}
function estimateVolume(ticker) {
  const v = { AAPL:85,MSFT:72,NVDA:240,AMZN:41,TSLA:180,META:60,GOOGL:29,AMD:95,INTC:55 };
  return (v[ticker] || (Math.random() * 50 + 5)) * 1e6 * (0.7 + Math.random() * 0.6);
}
function genSparkline(base) {
  const arr = []; let v = base;
  for (let i = 0; i < 20; i++) { v += (Math.random() - 0.495) * v * 0.008; arr.push(v); }
  return arr;
}

// ── Formatters ────────────────────────────────────────────────
function fmt(n, d = 2) {
  if (n == null || isNaN(n)) return '--';
  return n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '--';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}
function fmtMcap(n) {
  if (!n || isNaN(n)) return '--';
  if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return '$' + (n / 1e9).toFixed(1)  + 'B';
  if (n >= 1e6)  return '$' + (n / 1e6).toFixed(0)  + 'M';
  return '$' + n.toFixed(0);
}
function fmtVol(n) {
  if (!n || isNaN(n)) return '--';
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  return (n / 1e3).toFixed(0) + 'K';
}

// ── Sparkline SVG ─────────────────────────────────────────────
function renderSparkline(points, up) {
  if (!points || points.length < 2) return '<div class="sparkline"></div>';
  const min = Math.min(...points), max = Math.max(...points), range = max - min || 1;
  const W = 100, H = 32, pad = 2;
  const coords = points.map((v, i) => {
    const x = pad + (i / (points.length - 1)) * (W - pad * 2);
    const y = pad + (1 - (v - min) / range) * (H - pad * 2);
    return [x.toFixed(1), y.toFixed(1)];
  });
  const pts   = coords.map(c => c.join(',')).join(' ');
  const fill  = `${pad},${H} ` + coords.map(c => c.join(',')).join(' ') + ` ${W - pad},${H}`;
  const color = up ? '#22c55e' : '#f43f5e';
  const fclr  = up ? 'rgba(34,197,94,0.08)' : 'rgba(244,63,94,0.08)';
  const last  = coords[coords.length - 1];
  return `<div class="sparkline"><svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <polygon points="${fill}" fill="${fclr}" stroke="none"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="2" fill="${color}"/>
  </svg></div>`;
}

// ── Stock card HTML ───────────────────────────────────────────
function renderCard(ticker, groupId, idx, editable) {
  const d    = stockData[ticker];
  const prev = prevPrices[ticker];
  const flash = d && prev
    ? (d.price > prev ? ' flash-up' : d.price < prev ? ' flash-down' : '')
    : '';
  const up       = d ? d.changePct >= 0 : null;
  const dirClass = d ? (up ? 'up' : 'down') : '';
  const name     = COMPANY_NAMES[ticker] || ticker;

  return `<div class="stock-card ${dirClass}${flash}" id="card-${groupId}-${ticker}">
    ${d && Math.abs(d.changePct || 0) > 3 ? '<div class="alert-dot" title="High volatility (&gt;3%)"></div>' : ''}
    <div class="card-top">
      ${editable
        ? `<input class="card-edit-input" value="${ticker}"
             onblur="editTicker(${groupId},${idx},this.value)"
             onkeydown="if(event.key==='Enter')this.blur()"
             style="text-transform:uppercase" maxlength="8">`
        : `<div class="card-ticker">${ticker}</div>`}
      ${d
        ? `<div class="card-chg ${up ? 'up' : 'down'}">${fmtPct(d.changePct)}</div>`
        : `<div class="card-chg flat">--</div>`}
    </div>
    <div class="card-name">${name}</div>
    <div class="card-price">${d ? '$' + fmt(d.price) : '<span style="color:var(--muted)">Loading...</span>'}</div>
    ${d?.sparkline ? renderSparkline(d.sparkline, up) : '<div class="sparkline"></div>'}
    <div class="card-metrics">
      <div class="metric">
        <div class="metric-label">Mkt Cap</div>
        <div class="metric-value">${d ? fmtMcap(d.marketCap) : '--'}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Volume</div>
        <div class="metric-value">${d ? fmtVol(d.volume) : '--'}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Prev Close</div>
        <div class="metric-value">$${d ? fmt(d.prevClose) : '--'}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Day Open</div>
        <div class="metric-value">$${d ? fmt(d.open) : '--'}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Pre-Mkt</div>
        <div class="metric-value pre">$${d ? fmt(d.preMarket) : '--'}</div>
      </div>
      <div class="metric">
        <div class="metric-label">After-Hrs</div>
        <div class="metric-value after">$${d ? fmt(d.afterHours) : '--'}</div>
      </div>
    </div>
  </div>`;
}

// ── Render all groups ─────────────────────────────────────────
function renderGroups() {
  const filter    = document.getElementById('searchInput')?.value?.toUpperCase().trim() || '';
  const container = document.getElementById('groupsContainer');
  if (!container) return;

  let html = '';
  groups.forEach(g => {
    let tickers = g.tickers.filter(t =>
      !filter || t.includes(filter) || (COMPANY_NAMES[t] || '').toUpperCase().includes(filter)
    );
    if (filter && tickers.length === 0) return;

    let sorted = [...tickers];
    if (sortMode === 'chg')   sorted.sort((a, b) => (stockData[b]?.changePct || 0) - (stockData[a]?.changePct || 0));
    if (sortMode === 'price') sorted.sort((a, b) => (stockData[b]?.price     || 0) - (stockData[a]?.price     || 0));
    if (sortMode === 'mcap')  sorted.sort((a, b) => (stockData[b]?.marketCap || 0) - (stockData[a]?.marketCap || 0));

    const editing = editingGroupId === g.id;
    const empty   = tickers.length < 7 && !filter
      ? Array(7 - tickers.length).fill(0).map(() =>
          `<div class="stock-card-empty" onclick="openEditGroup(${g.id})">+ Add</div>`
        ).join('')
      : '';

    html += `<div class="group-section" id="group-${g.id}">
      <div class="group-header">
        <div class="group-title-area">
          ${editing
            ? `<input class="group-name-input" id="gname-${g.id}" value="${g.name}"
                 onblur="saveGroupName(${g.id},this.value)"
                 onkeydown="if(event.key==='Enter')this.blur()">`
            : `<div class="group-name" onclick="startEditGroupName(${g.id})" title="Click to rename">${g.name}</div>`}
          <div class="group-badge">${tickers.length}/7 stocks</div>
        </div>
        <div class="group-actions">
          <button class="btn" onclick="openEditGroup(${g.id})">Edit Tickers</button>
          <button class="btn danger" onclick="deleteGroup(${g.id})">&#215; Remove</button>
        </div>
      </div>
      <div class="stock-grid">
        ${sorted.map((t, i) => renderCard(t, g.id, g.tickers.indexOf(t), editing)).join('')}
        ${empty}
      </div>
    </div>`;
  });
  container.innerHTML = html;

  // Auto-focus group rename input
  if (editingGroupId) {
    const el = document.getElementById(`gname-${editingGroupId}`);
    if (el) el.focus();
  }
}

// ── Group name editing ────────────────────────────────────────
function startEditGroupName(id) {
  editingGroupId = id;
  renderGroups();
}
function saveGroupName(id, val) {
  const g = groups.find(x => x.id === id);
  if (g && val.trim()) g.name = val.trim();
  editingGroupId = null;
  saveGroups();
  renderGroups();
}

// ── Ticker editing inside a card ──────────────────────────────
function editTicker(groupId, idx, val) {
  const g = groups.find(x => x.id === groupId);
  if (!g) return;
  const t = val.toUpperCase().trim();
  if (t && t !== g.tickers[idx]) {
    g.tickers[idx] = t;
    saveGroups();
    fetchQuotes([t]).then(renderGroups);
  }
}

// ── Modal ─────────────────────────────────────────────────────
function openAddGroup() {
  editingGroupId = null;
  document.getElementById('modalTitle').textContent   = 'New Watch Group';
  document.getElementById('modalGroupName').value     = '';
  document.getElementById('modalTickers').value       = 'AAPL, MSFT, NVDA, AMZN, TSLA, META, GOOGL';
  document.getElementById('modalOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('modalGroupName').focus(), 80);
}
function openEditGroup(id) {
  const g = groups.find(x => x.id === id);
  if (!g) return;
  editingGroupId = id;
  document.getElementById('modalTitle').textContent   = `Edit: ${g.name}`;
  document.getElementById('modalGroupName').value     = g.name;
  document.getElementById('modalTickers').value       = g.tickers.join(', ');
  document.getElementById('modalOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('modalGroupName').focus(), 80);
}
function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
  editingGroupId = null;
}
function saveGroup() {
  const name    = document.getElementById('modalGroupName').value.trim() || 'Watch Group';
  const tickers = document.getElementById('modalTickers').value
    .toUpperCase().split(/[,\s]+/).map(t => t.trim()).filter(Boolean).slice(0, 7);
  if (!tickers.length) return;

  if (editingGroupId) {
    const g = groups.find(x => x.id === editingGroupId);
    if (g) { g.name = name; g.tickers = tickers; }
  } else {
    groups.push({ id: Date.now(), name, tickers });
  }
  saveGroups();
  closeModal();
  const newTickers = tickers.filter(t => !stockData[t]);
  if (newTickers.length) fetchQuotes(newTickers).then(renderGroups);
  else renderGroups();
}
function deleteGroup(id) {
  if (!confirm('Remove this watch group?')) return;
  groups = groups.filter(x => x.id !== id);
  saveGroups();
  renderGroups();
}

// ── Ticker bar (indices) ──────────────────────────────────────
function updateTickerBar() {
  const indices = ['SPY', 'QQQ', 'DIA', 'IWM'];
  const extras  = getAllTickers().slice(0, 6);
  const all     = [...new Set([...indices, ...extras])];
  const bar     = document.getElementById('tickerBar');
  if (!bar) return;
  bar.innerHTML = all.map((t, i) => {
    const d  = stockData[t];
    const up = d ? d.changePct >= 0 : null;
    return `<div class="ticker-item">
      <span class="ticker-sym">${t}</span>
      <span class="ticker-price">${d ? '$' + fmt(d.price) : '...'}</span>
      <span class="ticker-chg" style="color:${d ? (up ? 'var(--green)' : 'var(--red)') : 'var(--muted)'}">${d ? fmtPct(d.changePct) : '--'}</span>
      ${i < all.length - 1 ? '<span class="ticker-sep">|</span>' : ''}
    </div>`;
  }).join('');
}

// ── Full refresh ──────────────────────────────────────────────
async function refreshAll(force = false) {
  if (!force && Date.now() - lastRefresh < 8000) return;
  const tickers = [...new Set([...getAllTickers(), 'SPY', 'QQQ', 'DIA', 'IWM'])];
  await fetchQuotes(tickers);
  renderGroups();
  updateTickerBar();
}

// ── Polling ───────────────────────────────────────────────────
function startPolling() {
  if (pollingTimer) clearInterval(pollingTimer);
  const interval = parseInt(document.getElementById('intervalSelect').value);
  pollingTimer = setInterval(() => refreshAll(), interval);
}

// ── Clock & market status ─────────────────────────────────────
function updateClock() {
  const et  = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const h   = et.getHours(), m = et.getMinutes(), s = et.getSeconds();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('clock').textContent = `${pad(h)}:${pad(m)}:${pad(s)} ET`;

  const preOpen = h < 9 || (h === 9 && m < 30);
  const open    = (h === 9 && m >= 30) || (h >= 10 && h < 16);
  const dot     = document.getElementById('statusDot');
  const txt     = document.getElementById('statusText');

  if (open) {
    dot.style.background  = 'var(--green)';
    dot.style.animation   = 'pulse 2s ease-in-out infinite';
    txt.textContent        = 'MARKET OPEN';
    txt.style.color        = 'var(--green)';
  } else if (preOpen) {
    dot.style.background  = 'var(--amber)';
    dot.style.animation   = 'none';
    txt.textContent        = 'PRE-MARKET';
    txt.style.color        = 'var(--amber)';
  } else {
    dot.style.background  = 'var(--muted)';
    dot.style.animation   = 'none';
    txt.textContent        = 'AFTER-HOURS';
    txt.style.color        = 'var(--muted2)';
  }
}

// ── Event listeners ───────────────────────────────────────────
document.getElementById('intervalSelect').addEventListener('change', startPolling);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── INIT ──────────────────────────────────────────────────────
updateClock();
setInterval(updateClock, 1000);

// Pre-populate with mock data immediately so UI isn't blank
const allTickers = [...new Set([...getAllTickers(), 'SPY', 'QQQ', 'DIA', 'IWM'])];
allTickers.forEach(t => { if (!stockData[t]) stockData[t] = getMockData(t); });

renderGroups();
updateTickerBar();
startPolling();

// Then fetch real data
refreshAll(true);
</script>
</body>
</html>
